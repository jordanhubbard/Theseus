name: freebsd.local
os: freebsd
arch: amd64
host: freebsd.local
user: jkh
driver: freebsd_ports
ports_root: /usr/ports
python: /usr/local/bin/python3
# FreeBSD build worker.
# ports tree at /usr/ports, Python 3.11 at /usr/local/bin/python3.
# Nix installed in single-user mode at /nix (used for nixpkgs snapshot import,
# not for builds — nixpkgs builds go to ubuntu.local).
