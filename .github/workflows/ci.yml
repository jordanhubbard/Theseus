name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: "Python ${{ matrix.python-version }} / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python test dependencies
        run: pip install pytest

      - name: Install Node.js test dependencies (semver)
        run: npm install

      - name: Validate Z-spec files
        run: make validate-zspecs

      - name: Run tests
        run: make test

      - name: Validate example records
        run: python3 tools/validate_record.py examples/ --quiet

  freebsd:
    name: "FreeBSD 14 / Python 3.11"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests on FreeBSD
        uses: cross-platform-actions/action@v0.25.0
        with:
          operating_system: freebsd
          version: "14.2"
          shell: bash
          run: |
            sudo pkg install -y python311 py311-pip node22 npm-node22 py311-sqlite3
            python3.11 -m pip install --quiet pytest
            npm install
            make validate-zspecs
            make test
