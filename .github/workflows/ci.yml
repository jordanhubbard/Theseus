name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: "Python ${{ matrix.python-version }} / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # Python 3.9 dropped: codebase uses PEP 604 union syntax ('str | None')
        # which was introduced in 3.10. Python 3.9 reached EOL in 2025.
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install system libraries (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libzstd-dev liblz4-dev libpcre2-dev

      - name: Install system libraries (macOS)
        if: runner.os == 'macOS'
        run: brew install zstd lz4 pcre2 || true

      - name: Install Python dependencies
        run: |
          pip install pytest pyyaml \
            attrs certifi chardet colorama decorator python-dotenv filelock idna \
            Markdown more-itertools packaging platformdirs pluggy pyparsing pytz \
            setuptools six stevedore tomli tomlkit traitlets "typing-extensions" \
            tzdata urllib3 wrapt fsspec isodate distro \
            dnspython "zope.interface" fonttools protobuf networkx \
            psutil pygments msgpack MarkupSafe \
            lxml Pillow numpy tornado defusedxml docutils pathspec \
            filelock

      - name: Install Node.js dependencies
        run: npm install

      - name: Validate Z-spec files
        run: make validate-zspecs

      - name: Run tests
        run: make test

      - name: Validate example records
        run: python3 tools/validate_record.py examples/ --quiet

      - name: Compile Z-specs for JSON verification
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: make compile-zsdl

      - name: Run verify-all-specs and write JSON results
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: make verify-all-specs-json OUT=verify-all-specs-results.json

      - name: Upload verify-all-specs JSON results
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: verify-all-specs-results
          path: verify-all-specs-results.json

  freebsd:
    name: "FreeBSD 14 / Python 3.11"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests on FreeBSD
        uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: freebsd
          version: "14.2"
          shell: bash
          run: |
            sudo pkg install -y \
              gmake \
              python311 py311-pip node22 npm-node22 py311-sqlite3 \
              py311-attrs py311-certifi py311-chardet py311-colorama \
              py311-decorator py311-filelock py311-idna \
              py311-more-itertools py311-packaging py311-platformdirs \
              py311-pluggy py311-pyparsing py311-pytz py311-six \
              py311-tomlkit py311-traitlets py311-typing-extensions \
              py311-tzdata py311-urllib3 py311-wrapt \
              py311-pygments py311-markupsafe py311-msgpack \
              py311-networkx py311-psutil py311-dnspython \
              py311-defusedxml py311-docutils \
              zstd liblz4 pcre2 || true
            PYTHON=$(command -v python3.11 2>/dev/null || command -v python3 2>/dev/null || command -v python 2>/dev/null)
            echo "Using Python: $PYTHON ($($PYTHON --version))"
            $PYTHON -m pip install --quiet \
              pytest pyyaml tomli isodate distro fsspec \
              "zope.interface" fonttools protobuf tornado pathspec \
              python-dotenv stevedore Markdown numpy Pillow lxml
            npm install
            # Use gmake (installed via pkg dependency above) rather than the
            # FreeBSD base 'make' — the Makefile uses GNU-make-only syntax
            # ($(if ...) conditionals) that BSD make does not understand.
            gmake validate-zspecs PYTHON=$PYTHON
            gmake test PYTHON=$PYTHON
            # Cross-OS spec verification — runs the curated smoke set
            # (libpcap from base, Python stdlib, npm pure-functions) on
            # FreeBSD specifically. This is the strongest evidence that
            # ZSDL invariants hold across a third UNIX target.
            gmake freebsd-smoke PYTHON=$PYTHON
