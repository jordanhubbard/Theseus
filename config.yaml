# Theseus configuration — generic defaults, checked into git.
# Site-specific overrides (API keys, IPs, local paths) go in config.site.yaml,
# which is gitignored and never committed.  See config.yaml.example for the
# full list of available keys.

ai:
  # 'auto': use claude CLI if in PATH, otherwise openai-compatible endpoint
  # 'claude': always use claude CLI
  # 'openai': always use openai-compatible endpoint
  provider: auto
  openai_base_url: "http://localhost:11434/v1"
  openai_api_key: ""
  openai_model: "gpt-4o"

artifact_store:
  url: "file:///tmp/theseus-artifacts"

targets:
  - name: local
    os: darwin
    arch: arm64
    local: true
