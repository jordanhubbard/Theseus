site_name: Theseus
site_description: Canonical package recipe toolchain with Z-layer behavioral spec verification
site_url: https://jordanhubbard.github.io/Theseus/
repo_url: https://github.com/jordanhubbard/Theseus
repo_name: jordanhubbard/Theseus
edit_uri: edit/main/docs/guide/

docs_dir: docs/guide
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - Pipeline: pipeline.md
  - Z-Layer Specs: z-layer.md
  - Writing Specs: writing-specs.md
  - Reference: reference.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.snippets

plugins:
  - search
